services:
  maryilu-image-storage:
    build:
      context: .
      dockerfile: Dockerfile
    image: maryilu-image-storage:latest
    container_name: maryilu-image-storage
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "18142"
      MEDIA_ROOT: /data/media
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://media.maryilu.com}
    ports:
      - "127.0.0.1:18142:18142"
    volumes:
      - ./data/media:/data/media
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18142/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
